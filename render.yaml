# Render Blueprint Specification for Talka Chat Application
# Deploys Database (Postgres), Cache (Redis), REST API, WS Gateway, and Frontend client.
# All services are co-located in the Oregon (us-west) region for minimal latency.

databases:
  - name: talka-db
    plan: free
    region: oregon

services:
  # 1. Redis Cache Service (Internal access only)
  - type: redis
    name: talka-redis
    plan: free
    region: oregon
    ipAllowList: [] # Secure: Only allow internal services in the same account to connect

  # 2. REST API Server (Express Node.js application)
  - type: web
    name: talka-api
    env: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm db:generate && pnpm --filter api build
    startCommand: pnpm --filter api start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Generates a secure random JWT key automatically
      - key: DATABASE_URL
        fromDatabase:
          name: talka-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: talka-redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: talka-web
          property: url

  # 3. Go WebSocket Gateway Service
  - type: web
    name: talka-gateway
    env: docker
    plan: free
    region: oregon
    dockerfilePath: apps/gateway/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 8080
      - key: REDIS_URL
        fromService:
          type: redis
          name: talka-redis
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: talka-api
          envVarKey: JWT_SECRET

  # 4. Next.js Frontend Application
  - type: web
    name: talka-web
    env: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter types build && pnpm --filter web build
    startCommand: pnpm --filter web start
    envVars:
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: talka-api
          property: url
      - key: NEXT_PUBLIC_GATEWAY_URL
        fromService:
          type: web
          name: talka-gateway
          property: url
