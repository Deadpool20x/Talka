# Render Blueprint Specification for Talka Chat Application
# Deploys Database (Postgres), Cache (Redis), REST API, WS Gateway, and Frontend client.
# All services are co-located in the Oregon (us-west) region for minimal latency.

databases:
  - name: talka-db
    plan: free
    region: oregon

services:
  # 1. Redis Cache Service (Internal access only)
  - type: redis
    name: talka-redis
    plan: free
    region: oregon
    ipAllowList: [] # Secure: Only allow internal services in the same account to connect

  # 2. REST API Server (Express Node.js application)
  - type: web
    name: talka-api
    env: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm db:generate && pnpm --filter @chat-os/prisma db:migrate:prod && pnpm --filter @chat-os/api... build
    startCommand: pnpm --filter @chat-os/api start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Generates a secure random JWT key automatically
      - key: DATABASE_URL
        fromDatabase:
          name: talka-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: talka-redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://talka-web.onrender.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false

  # 3. Go WebSocket Gateway Service
  - type: web
    name: talka-gateway
    env: docker
    plan: free
    region: oregon
    dockerfilePath: apps/gateway/Dockerfile
    dockerContext: apps/gateway
    envVars:
      - key: PORT
        value: 8080
      - key: GATEWAY_PORT
        value: 8080
      - key: GATEWAY_ENV
        value: production
      - key: GATEWAY_REDIS_URL
        fromService:
          type: redis
          name: talka-redis
          property: connectionString
      - key: GATEWAY_JWT_SECRET
        fromService:
          type: web
          name: talka-api
          envVarKey: SUPABASE_JWT_SECRET
      - key: GATEWAY_API_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

  # 4. Next.js Frontend Application
  - type: web
    name: talka-web
    env: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm --filter @chat-os/web... build
    startCommand: pnpm --filter @chat-os/web start
    envVars:
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_GATEWAY_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
